name: Windows 2022 RDP Full

on: workflow_dispatch

jobs:
  rdp:
    runs-on: windows-2022
    steps:
      - name: Deploy Environment
        shell: pwsh
        run: |
          $ErrorActionPreference = "SilentlyContinue"
          
          Write-Host "1. Обновление подсистемы WSL..."
          # Принудительно обновляем ядро WSL, чтобы Podman смог создать Linux-окружение
          wsl --update
          
          Write-Host "2. Установка программ (Telegram, VS Code, Podman)..."
          choco install telegram vscode podman-cli googlechrome -y --no-progress --ignore-errors
          
          Write-Host "3. Установка плагина podman-compose..."
          pip install podman-compose --quiet
          
          Write-Host "4. Настройка сетевого туннеля bore..."
          if (Test-Path "bore.zip") { Remove-Item "bore.zip" -Force }
          if (Test-Path "bore.exe") { Remove-Item "bore.exe" -Force }
          
          # Скачиваем через curl.exe — это исключит повреждение архива
          curl.exe -L -o bore.zip https://github.com
          tar -xf bore.zip
          
          Write-Host "5. Настройка конфигурации RDP..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -value 0
          
          Write-Host "6. Запуск виртуальной машины Podman..."
          # После обновления WSL импорт Linux-дистрибутива пройдет без ошибок
          podman machine init
          podman machine start
          
          Write-Host "7. Настройка пользователя..."
          $password = -join ((33..126) | Get-Random -Count 15 | % {[char]$_})
          net user runneradmin $password
          
          Write-Host "8. Запуск туннеля..."
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput "tunnel.log" -WindowStyle Hidden
          
          $tunnelUrl = $null
          for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 2
              if (Test-Path "tunnel.log") {
                  $log = Get-Content "tunnel.log" -Raw
                  if ($log -match "listening at (bore.pub:\d+)") {
                      $tunnelUrl = $matches[1]
                      break
                  }
              }
          }
          
          if (-not $tunnelUrl) { 
              Write-Error "Не удалось получить адрес туннеля из логов bore."
              exit 1 
          }

          Write-Host "========================================================="
          Write-Host "   Windows 2022 (Win 10 x64) успешно запущена!          "
          Write-Host "========================================================="
          Write-Host "Адрес для подключения:  $tunnelUrl"
          Write-Host "Пользователь:           runneradmin"
          Write-Host "Пароль:                 $password"
          Write-Host "========================================================="
          
          Write-Host "::notice title=RDP Access Info::Host: $tunnelUrl | User: runneradmin | Pass: $password"
          
          # Оставляем машину включенной на 6 часов
          Start-Sleep -Seconds 21600
