name: Linux Podman SSH Ubuntu 22

on: workflow_dispatch

jobs:
  ssh-podman:
    runs-on: ubuntu-22.04  # Фиксируем версию на Ubuntu 22.04
    steps:
      - name: Setup Podman & Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-docker
          # Установка podman-compose через pip
          pip3 install podman-compose

      - name: Deploy Bore & SSH
        run: |
          # Скачивание и распаковка туннеля bore для Linux
          curl -LO https://github.com
          tar -xzf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz

          # Установка пароля для пользователя runner
          PASSWORD=$(openssl rand -base64 12)
          echo "runner:$PASSWORD" | sudo chpasswd

          # Настройка SSH-сервера для авторизации по паролю
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

          # Запуск туннеля bore в фоновом режиме на порт SSH (22)
          ./bore local 22 --to bore.pub > tunnel.log 2>&1 &

          # Ожидание получения адреса подключения
          TUNNEL_URL=""
          for i in {1..30}; do
              sleep 2
              if [ -f tunnel.log ]; then
                  LOG=$(cat tunnel.log)
                  if [[ $LOG =~ listening\ at\ (bore.pub:[0-9]+) ]]; then
                      TUNNEL_URL=${BASH_REMATCH}
                      break
                  fi
              fi
          done

          if [ -z "$TUNNEL_URL" ]; then
              echo "Ошибка: не удалось запустить туннель bore."
              cat tunnel.log
              exit 1
          fi

          # Извлечение хоста и порта для удобства команды SSH
          HOST=$(echo $TUNNEL_URL | cut -d':' -f1)
          PORT=$(echo $TUNNEL_URL | cut -d':' -f2)

          # Вывод данных для подключения в консоль GitHub Actions
          echo "===========  топчик Ubuntu 22.04 с Podman ================"
          echo "Адрес:      $TUNNEL_URL"
          echo "Юзер:       runner"
          echo "Пароль:     $PASSWORD"
          echo "Команда:    ssh runner@$HOST -p $PORT"
          echo "=========================================================="

          # Создание уведомления на вкладке Summary
          echo "::notice title=SSH Access::ssh runner@$HOST -p $PORT | Pass: $PASSWORD"

          # Удержание сессии активной в течение 6 часов (21600 секунд)
          sleep 21600
