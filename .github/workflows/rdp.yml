name: Windows RDP Full

on: workflow_dispatch

jobs:
  rdp:
    runs-on: windows-latest  # Использует Windows Server 2022
    steps:
      - name: Deploy
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          
          # Быстрая установка программ без вывода лишнего прогресс-бара
          choco install googlechrome telegram vscode -y --no-progress
          
          # Скачивание и распаковка туннеля bore
          Invoke-WebRequest "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive bore.zip -DestinationPath .
          
          # Включение RDP в системе и настройка брандмауэра
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -value 0
          
          # Генерация надежного пароля для runneradmin
          $password = -join ((33..126) | Get-Random -Count 15 | % {[char]$_})
          net user runneradmin $password
          
          # Запуск туннеля в фоновом режиме
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput "tunnel.log" -WindowStyle Hidden
          
          # Ожидание получения адреса подключения
          $tunnelUrl = $null
          for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 2
              if (Test-Path "tunnel.log") {
                  $log = Get-Content "tunnel.log" -Raw
                  if ($log -match "listening at (bore.pub:\d+)") {
                      $tunnelUrl = $matches[1]
                      break
                  }
              }
          }
          
          if (-not $tunnelUrl) { Write-Host "Ошибка: не удалось запустить туннель bore."; exit 1 }

          # Вывод данных для подключения в консоль GitHub Actions
          Write-Host "===========  топчик Server 2022 ================"
          Write-Host "адрес:      $tunnelUrl"
          Write-Host "юзер:       runneradmin"
          Write-Host "пароль:     $password"
          Write-Host "============================================="
          
          # Создание красивого уведомления (Notice) на вкладке Summary
          Write-Host "::notice title=RDP Access::Host: $tunnelUrl | User: runneradmin | Pass: $password"
          
          # Удержание сессии активной в течение 6 часов (21600 секунд)
          Start-Sleep -Seconds 21600 # Удерживаем как на Server 2022
