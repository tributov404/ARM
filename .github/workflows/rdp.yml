name: Linux Podman SSH Ubuntu 22

on: workflow_dispatch

jobs:
  ssh-podman:
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Podman & Compose
        run: |
          sudo apt-get update --allow-releaseinfo-change || true
          sudo apt-get install -y podman-docker python3-pip
          pip3 install podman-compose

      - name: Deploy Bore & SSH
        run: |
          set -euo pipefail

          # === Скачивание bore (всегда свежая версия) ===
          echo "Получаем последнюю версию bore..."
          BORE_RELEASE=$(curl -s https://api.github.com/repos/ekzhang/bore/releases/latest | grep -o '"tag_name": "[^"]*' | cut -d'"' -f4)
          
          echo "Скачиваем bore ${BORE_RELEASE}..."
          curl -L -o bore.tar.gz "https://github.com/ekzhang/bore/releases/download/${BORE_RELEASE}/bore-${BORE_RELEASE}-x86_64-unknown-linux-musl.tar.gz"
          
          tar -xzf bore.tar.gz
          chmod +x bore
          echo "bore готов к использованию"

          # === Настройка SSH ===
          PASSWORD=$(openssl rand -base64 12)
          echo "runner:$PASSWORD" | sudo chpasswd

          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sudo systemctl restart ssh

          # === Запуск туннеля ===
          ./bore local 22 --to bore.pub > tunnel.log 2>&1 &

          # Ожидание адреса туннеля
          TUNNEL_URL=""
          for i in {1..30}; do
              sleep 2
              if [ -f tunnel.log ]; then
                  LOG=$(cat tunnel.log)
                  if [[ $LOG =~ listening\ at\ (bore.pub:[0-9]+) ]]; then
                      TUNNEL_URL=${BASH_REMATCH[1]}   # ← исправлено
                      break
                  fi
              fi
          done

          if [ -z "$TUNNEL_URL" ]; then
              echo "❌ Ошибка: не удалось получить адрес туннеля"
              cat tunnel.log
              exit 1
          fi

          HOST=$(echo "$TUNNEL_URL" | cut -d':' -f1)
          PORT=$(echo "$TUNNEL_URL" | cut -d':' -f2)

          # === Вывод данных ===
          echo ""
          echo "=========== ✅ Ubuntu 22.04 + Podman + SSH ==========="
          echo "Адрес:   $TUNNEL_URL"
          echo "Юзер:    runner"
          echo "Пароль:  $PASSWORD"
          echo ""
          echo "ssh runner@$HOST -p $PORT"
          echo "===================================================="
          echo ""

          echo "::notice title=SSH Access::ssh runner@$HOST -p $PORT | Pass: $PASSWORD"

          # Держим раннер 6 часов
          sleep 21600
