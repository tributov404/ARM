name: Windows 2022 Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: [self-hosted, windows]

    steps:
      - name: Deploy Environment
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "1. Updating WSL..."
          wsl --update

          Write-Host "2. Installing software..."
          choco install telegram vscode podman-cli googlechrome -y --no-progress

          Write-Host "3. Installing podman-compose..."
          python -m pip install --upgrade pip
          python -m pip install podman-compose --quiet

          Write-Host "4. Enabling RDP..."
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" `
            -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" `
            -Value 1

          Write-Host "5. Configuring user password..."
          net user runneradmin "${{ secrets.RDP_PASSWORD }}"

          Write-Host "6. Starting Podman machine..."
          podman machine init
          podman machine start

          Write-Host "Done."
          Write-Host "::notice title=RDP Info::RDP enabled on self-hosted runner. User: runneradmin"
